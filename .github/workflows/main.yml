name: APK Derle
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Java Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Kur ve Derle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleDebug
